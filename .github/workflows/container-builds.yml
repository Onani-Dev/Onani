name: Container Builds

on:
  pull_request:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: app
            context: .
            file: Dockerfile.aio
          - image_name: celery
            context: .
            file: celery/dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image namespace
        id: vars
        shell: bash
        run: |
          echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "repo_lc=${GITHUB_REPOSITORY##*/}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.vars.outputs.owner_lc }}/${{ steps.vars.outputs.repo_lc }}-${{ matrix.image_name }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and optionally push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_name }}

      - name: Attempt to make GHCR package public
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER_LC: ${{ steps.vars.outputs.owner_lc }}
          REPO_LC: ${{ steps.vars.outputs.repo_lc }}
          IMAGE_NAME: ${{ matrix.image_name }}
        shell: bash
        run: |
          set -euo pipefail
          pkg="${REPO_LC}-${IMAGE_NAME}"

          patch_body='{"visibility":"public"}'
          headers=(
            -H "Authorization: Bearer ${GITHUB_TOKEN}"
            -H "Accept: application/vnd.github+json"
            -H "X-GitHub-Api-Version: 2022-11-28"
          )

          if curl -fsSL -X PATCH "${headers[@]}" \
            "https://api.github.com/orgs/${OWNER_LC}/packages/container/${pkg}" \
            -d "${patch_body}"; then
            echo "Set package visibility to public via org endpoint: ${pkg}"
            exit 0
          fi

          if curl -fsSL -X PATCH "${headers[@]}" \
            "https://api.github.com/users/${OWNER_LC}/packages/container/${pkg}" \
            -d "${patch_body}"; then
            echo "Set package visibility to public via user endpoint: ${pkg}"
            exit 0
          fi

          echo "Warning: Could not set package visibility to public automatically."
          echo "If pulls still require auth, set package visibility to Public in GHCR package settings."
