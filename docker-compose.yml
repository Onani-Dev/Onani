version: '3.8'

services:
  flask:
    build:
      context: .
    deploy:
      restart_policy:
        condition: unless-stopped
    expose:
      - 5000
    environment:
      FLASK_APP: run
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY}
      RECAPTCHA_PUBLIC_KEY: ${RECAPTCHA_PUBLIC_KEY}
      RECAPTCHA_PRIVATE_KEY: ${RECAPTCHA_PRIVATE_KEY}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    volumes:
      - images:/images
      - avatars:/avatars
      - ./migrations:/onani/migrations
      - logs:/logs

  nginx:
    build:
      context: .
      dockerfile: ./nginx/dockerfile
    deploy:
      restart_policy:
        condition: unless-stopped
    ports:
      - 8080:80
    depends_on:
      - flask
    volumes:
      - images:/images
      - avatars:/avatars
      - logs:/logs

  postgres:
    image: postgres:14-alpine
    deploy:
      restart_policy:
        condition: unless-stopped
    expose:
      - 5432
    volumes:
      - database:/var/lib/postgresql/data/
    environment:
      - PGUSER=onani_db
      - POSTGRES_USER=onani_db
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=onani_db
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.0.0-alpine
    deploy:
      restart_policy:
        condition: unless-stopped
    expose:
      - 6379
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli ping | grep PONG" ]
      interval: 1s
      timeout: 3s
      retries: 5

  celery:
    build:
      context: .
      dockerfile: ./celery/dockerfile
    deploy:
      restart_policy:
        condition: unless-stopped
    environment:
      FLASK_APP: run
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY}
      RECAPTCHA_PUBLIC_KEY: ${RECAPTCHA_PUBLIC_KEY}
      RECAPTCHA_PRIVATE_KEY: ${RECAPTCHA_PRIVATE_KEY}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    volumes:
      - images:/images
      - avatars:/avatars
      - ./migrations:/onani/migrations
      - logs:/logs

volumes:
  database:
  images:
  avatars:
  logs:
