# Single compose file for both dev and prod
# Usage:
#   podman-compose --profile dev up -d --build       (dev: local builds, hot reload)
#   podman-compose --profile prod up -d              (prod: GHCR pre-built images)

x-env: &dev-env
  FLASK_APP: run
  FLASK_ENV: development
  FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-dev}
  FLASK_SQLALCHEMY_ECHO: "True"
  TESTING: "True"
  DB_PASSWORD: ${DB_PASSWORD:-onani_db}
  DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-admin}
  DEEPDANBOORU_ENABLED: "true"
  DEEPDANBOORU_PROJECT_PATH: /models/deepdanbooru

x-env-prod: &prod-env
  FLASK_APP: run
  FLASK_SECRET_KEY: ${FLASK_SECRET_KEY}
  DB_PASSWORD: ${DB_PASSWORD}

x-db-deps: &db-deps
  postgres:
    condition: service_healthy
  redis:
    condition: service_healthy

services:
  # ──────────────────────────────────────────────────────────
  # DEVELOPMENT: local builds with hot reload
  # ──────────────────────────────────────────────────────────

  flask-dev:
    profiles: [ "dev" ]
    hostname: flask
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - 5000:5000
    environment: *dev-env
    depends_on: *db-deps
    volumes:
      - ${IMAGES_HOST_DIR:-images}:/images
      - ${AVATARS_HOST_DIR:-avatars}:/avatars
      - ./logs:/logs
      - ./:/onani
      - ${DEEPDANBOORU_MODEL_HOST_DIR:-./models/deepdanbooru}:/models/deepdanbooru:ro

  frontend-dev:
    profiles: [ "dev" ]
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - 5173:5173
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  celery-dev:
    profiles: [ "dev" ]
    build:
      context: .
      dockerfile: ./celery/Dockerfile.dev
    restart: unless-stopped
    environment:
      <<: *dev-env
      C_FORCE_ROOT: "yes"
    depends_on: *db-deps
    volumes:
      - ${IMAGES_HOST_DIR:-images}:/images
      - ${AVATARS_HOST_DIR:-avatars}:/avatars
      - ./logs:/logs
      - ./:/onani
      - ${DEEPDANBOORU_MODEL_HOST_DIR:-./models/deepdanbooru}:/models/deepdanbooru:ro

  # ──────────────────────────────────────────────────────────
  # PRODUCTION: pre-built images from GHCR
  # ──────────────────────────────────────────────────────────

  app:
    profiles: [ "prod" ]
    image: ${REGISTRY:-ghcr.io/onani-dev/onani}-app:${VERSION:-latest}
    restart: unless-stopped
    ports:
      - ${PORT:-80}:80
    environment: *prod-env
    depends_on: *db-deps
    volumes:
      - ${IMAGES_HOST_DIR:-images}:/images
      - ${AVATARS_HOST_DIR:-avatars}:/avatars
      - ./migrations:/onani/migrations

  celery:
    profiles: [ "prod" ]
    image: ${REGISTRY:-ghcr.io/onani-dev/onani}-celery:${VERSION:-latest}
    restart: unless-stopped
    environment: *prod-env
    depends_on: *db-deps
    volumes:
      - ${IMAGES_HOST_DIR:-images}:/images
      - ${AVATARS_HOST_DIR:-avatars}:/avatars
      - ./migrations:/onani/migrations

  # ──────────────────────────────────────────────────────────
  # SHARED: Postgres + Redis (both dev and prod)
  # ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:14-alpine
    restart: unless-stopped
    ports:
      - 5432:5432
    volumes:
      - ${DATABASE_HOST_DIR:-database}:/var/lib/postgresql/data/
    environment:
      PGUSER: onani_db
      POSTGRES_USER: onani_db
      POSTGRES_PASSWORD: ${DB_PASSWORD:-onani_db}
      POSTGRES_DB: onani_db
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready" ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.0.0-alpine
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli ping | grep PONG" ]
      interval: 1s
      timeout: 3s
      retries: 5

volumes:
  database:
  images:
  avatars:
  logs:
  frontend_node_modules:
