version: '3.8'

services:
  flask:
    build:
      context: .
    expose:
    - 5000
    environment:
      FLASK_APP: run
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
    - files:/files

  nginx:
    build: ./nginx
    ports:
      - 5000:80
    depends_on:
      - flask

  mysql:
    image: mysql
    ports:
      - 3306:3306
    #expose:
    #- 3306
    environment:
      MYSQL_DATABASE: onani_db
      MYSQL_ROOT_PASSWORD: root
    volumes:
    - database:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

volumes:
  database:
  files:
