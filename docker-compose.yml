# Usage:
#   podman-compose -f docker-compose.yml --profile prod up -d --build   (production app mode)
#   podman-compose -f docker-compose.yml --profile dev  up -d --build   (development mode)
#   ./build.sh dev   or   ./build.sh prod
#
# Flask:    http://localhost:5000
# Vite SPA: http://localhost:5173/

x-env: &env
  FLASK_APP: run

x-dev-env: &dev-env
  <<: *env
  FLASK_ENV: development
  FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-dev}
  FLASK_SQLALCHEMY_ECHO: "True"
  TESTING: "True"
  DB_PASSWORD: ${DB_PASSWORD:-onani_db}
  DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-admin}
  DEEPDANBOORU_ENABLED: "true"
  DEEPDANBOORU_PROJECT_PATH: /models/deepdanbooru

x-prod-env: &prod-env
  <<: *env
  FLASK_SECRET_KEY: ${FLASK_SECRET_KEY}
  DB_PASSWORD: ${DB_PASSWORD}

x-db-deps: &db-deps
  postgres:
    condition: service_healthy
  redis:
    condition: service_healthy

services:
  # ── Flask ───────────────────────────────────────────────
  flask:
    profiles: [ "prod" ]
    build: .
    restart: unless-stopped
    expose:
      - 5000
    environment: *prod-env
    depends_on: *db-deps
    volumes:
      - ${IMAGES_HOST_DIR:-images}:/images
      - ${AVATARS_HOST_DIR:-avatars}:/avatars
      - ./migrations:/onani/migrations
      - logs:/logs

  flask-dev:
    profiles: [ "dev" ]
    hostname: flask
    build:
      context: .
      dockerfile: dockerfile.dev
    restart: unless-stopped
    ports:
      - 5000:5000
    environment: *dev-env
    depends_on: *db-deps
    volumes:
      - ${IMAGES_HOST_DIR:-images}:/images
      - ${AVATARS_HOST_DIR:-avatars}:/avatars
      - ./logs:/logs
      - ./:/onani
      - ${DEEPDANBOORU_MODEL_HOST_DIR:-./models/deepdanbooru}:/models/deepdanbooru:ro

  # ── Optional in-repo proxy (not required) ───────────────
  nginx:
    profiles: [ "proxy" ]
    build:
      context: .
      dockerfile: ./nginx/dockerfile
    restart: unless-stopped
    ports:
      - 8080:80
    depends_on:
      - flask
      - frontend
    volumes:
      - ${IMAGES_HOST_DIR:-images}:/images
      - ${AVATARS_HOST_DIR:-avatars}:/avatars
      - logs:/logs
      - frontend_dist:/frontend/dist

  nginx-dev:
    profiles: [ "proxy" ]
    build:
      context: .
      dockerfile: ./nginx/dockerfile
    restart: unless-stopped
    ports:
      - 8080:80
    depends_on:
      - flask-dev
    volumes:
      - ${IMAGES_HOST_DIR:-images}:/images
      - ${AVATARS_HOST_DIR:-avatars}:/avatars
      - ./logs:/logs
      - ./frontend/public/static:/static
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/nginx.conf:ro

  # ── Frontend ────────────────────────────────────────────
  frontend:
    profiles: [ "frontend-build" ]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - frontend_dist:/app/dist

  frontend-dev:
    profiles: [ "dev" ]
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - 5173:5173
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  # ── Celery ──────────────────────────────────────────────
  celery:
    profiles: [ "prod" ]
    build:
      context: .
      dockerfile: ./celery/dockerfile
    restart: unless-stopped
    environment: *prod-env
    depends_on: *db-deps
    volumes:
      - ${IMAGES_HOST_DIR:-images}:/images
      - ${AVATARS_HOST_DIR:-avatars}:/avatars
      - ./migrations:/onani/migrations
      - logs:/logs

  celery-dev:
    profiles: [ "dev" ]
    build:
      context: .
      dockerfile: ./celery/dockerfile.dev
    restart: unless-stopped
    environment:
      <<: *dev-env
      C_FORCE_ROOT: "yes"
    depends_on: *db-deps
    volumes:
      - ${IMAGES_HOST_DIR:-images}:/images
      - ${AVATARS_HOST_DIR:-avatars}:/avatars
      - ./logs:/logs
      - ./:/onani
      - ${DEEPDANBOORU_MODEL_HOST_DIR:-./models/deepdanbooru}:/models/deepdanbooru:ro

  # ── Shared infrastructure ──────────────────────────────
  postgres:
    image: postgres:14-alpine
    restart: unless-stopped
    ports:
      - 5432:5432
    volumes:
      - ${DATABASE_HOST_DIR:-database}:/var/lib/postgresql/data/
    environment:
      PGUSER: onani_db
      POSTGRES_USER: onani_db
      POSTGRES_PASSWORD: ${DB_PASSWORD:-onani_db}
      POSTGRES_DB: onani_db
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready" ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.0.0-alpine
    restart: unless-stopped
    ports:
      - 6379:6379
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli ping | grep PONG" ]
      interval: 1s
      timeout: 3s
      retries: 5

volumes:
  database:
  images:
  avatars:
  logs:
  frontend_dist:
  frontend_node_modules:
