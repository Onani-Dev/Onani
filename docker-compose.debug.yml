version: '3.8'

services:
  flask:
    build:
      context: .
      dockerfile:
        dockerfile.debug
    ports:
    - 5000:5000
    environment:
      FLASK_APP: run
      FLASK_ENV: development
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-dev}
      FLASK_SQLALCHEMY_ECHO: "True"
      TESTING: "True"
      RECAPTCHA_PUBLIC_KEY: ${RECAPTCHA_PUBLIC_KEY}
      RECAPTCHA_PRIVATE_KEY: ${RECAPTCHA_PRIVATE_KEY}
      DB_PASSWORD: ${DB_PASSWORD:-onani_db} 
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
    - images:/images
    - avatars:/avatars
    - migrations:/onani/migrations
    - logs:/logs
    - ./:/onani

  nginx:
    build: 
      context: .
      dockerfile: ./nginx/dockerfile
    ports:
      - 8080:80
    depends_on:
      - flask
    volumes:
    - images:/images
    - avatars:/avatars
    - logs:/logs
    - ./Onani/static:/static

  postgres:
    image: postgres:14-alpine
    ports:
      - 5432:5432
    volumes:
      - database:/var/lib/postgresql/data/
    environment:
      - PGUSER=onani_db
      - POSTGRES_USER=onani_db
      - POSTGRES_PASSWORD=${DB_PASSWORD:-onani_db}
      - POSTGRES_DB=onani_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 1s
      timeout: 5s
      retries: 10
  
  rabbitmq:
    image: rabbitmq:3.10.0-rc.3-alpine
    ports:
      - 5672:5672
    environment:
      - RABBITMQ_DEFAULT_USER=onani_mq
      - RABBITMQ_DEFAULT_PASS=${DB_PASSWORD:-onani_mq}
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 30s
      retries: 3

  worker:
    build:
      context: .
      dockerfile:
        dockerfile.worker
    environment:
      FLASK_APP: run
      FLASK_ENV: development
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-dev}
      FLASK_SQLALCHEMY_ECHO: "True"
      TESTING: "True"
      RECAPTCHA_PUBLIC_KEY: ${RECAPTCHA_PUBLIC_KEY}
      RECAPTCHA_PRIVATE_KEY: ${RECAPTCHA_PRIVATE_KEY}
      DB_PASSWORD: ${DB_PASSWORD:-onani_db} 
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
    - images:/images
    - avatars:/avatars
    - migrations:/onani/migrations
    - logs:/logs
    - ./:/onani
  # redis:
  #   image: redis:alpine

volumes:
  database:
  images:
  avatars:
  migrations:
  logs:
