version: '3.8'

services:
  flask:
    build:
      context: .
    ports:
    - 5001:5000
    environment:
      FLASK_APP: run
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-dev}
      FLASK_SQLALCHEMY_ECHO: "True"
      DB_PASSWORD: ${DB_PASSWORD:-onani_db}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
    - images:/images
    - avatars:/avatars
    - migrations:/onani/migrations
    - logs:/logs

  nginx:
    build: 
      context: .
      dockerfile: ./nginx/dockerfile
    ports:
      - 5000:80
    depends_on:
      - flask
    volumes:
    - images:/images
    - avatars:/avatars
    - logs:/logs

  postgres:
    image: postgres:14-alpine
    ports:
      - 5432:5432
    volumes:
      - database:/var/lib/postgresql/data/
    environment:
      - PGUSER=onani_db
      - POSTGRES_USER=onani_db
      - POSTGRES_PASSWORD=${DB_PASSWORD:-onani_db}
      - POSTGRES_DB=onani_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  database:
  images:
  avatars:
  migrations:
  logs:
