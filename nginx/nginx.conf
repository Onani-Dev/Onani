upstream onani {
    server flask:5000;
}

server {
    
    client_max_body_size 200M;
    listen 80;
    
    location /robots.txt { # doing this bc robots.txt file should be on root of the site.
        alias /static/robots.txt;
    }

    location /images/ {
        alias /images/;
    }

    location /static/ {
        alias /static/;
    }

    location / {
        proxy_pass http://onani;
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_redirect off;
    }

}