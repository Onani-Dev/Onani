upstream onani {
    server flask:5000;
}

server {
    listen 80;

    # Logging
    access_log /dev/stdout;
    error_log  /dev/stdout info;
    access_log /logs/onani.access.log;
    error_log  /logs/onani.error.log;

    # Error pages
    error_page 403 /403;
    error_page 404 /404;
    error_page 415 /415;

    # Limits
    client_max_body_size 200M;
    image_filter_buffer  50M;

    # ── Root-level well-known files ──────────────────────
    location = /robots.txt        { access_log off; alias /static/robots.txt; }
    location = /humans.txt        { access_log off; alias /static/humans.txt; }

    # ── Static assets ───────────────────────────────────
    location /images/  { access_log off; alias /images/; }
    location /avatars/ { access_log off; alias /avatars/; }
    location /static/  { access_log off; alias /static/; }

    # ── Image thumbnails ────────────────────────────────
    location ~ ^/(?<route>avatars|images)/thumbnail/(?<name>.*)$ {
        access_log off;
        alias /$route/$name;

        set $size 150;
        if ($arg_size = "xsmall") { set $size 50;  }
        if ($arg_size = "small")  { set $size 150; }
        if ($arg_size = "large")  { set $size 350; }
        if ($arg_size = "xlarge") { set $size 500; }

        image_filter_jpeg_quality 50;
        image_filter resize $size $size;
    }

    # ── Sample (preview) images ─────────────────────────
    location ~ ^/sample/(?<name>.*)$ {
        access_log off;
        alias /images/$name;

        image_filter_jpeg_quality 80;
        image_filter resize 800 2000;
    }

    # ── Vue SPA (hashed assets) ───────────────────────
    location /assets/ {
        access_log off;
        alias /frontend/dist/assets/;
        expires 30d;
    }

    # ── Flask backend (API, admin, feeds) ────────────────
    location /api/    { proxy_pass http://onani; include /etc/nginx/proxy_params; }
    location /admin/  { proxy_pass http://onani; include /etc/nginx/proxy_params; }
    location /atom/   { proxy_pass http://onani; include /etc/nginx/proxy_params; }
    location /rss/    { proxy_pass http://onani; include /etc/nginx/proxy_params; }

    # ── SPA catch-all (must be last) ─────────────────────
    location / {
        root /frontend/dist;
        try_files $uri $uri/ /index.html;
    }
}